name: Publish Wiki

# Mirrors the repo's docs/ folder into the GitHub wiki on every push that touches
# docs/. The wiki is a separate git repo (mod-sod-world.wiki.git); this treats docs/
# as the single source of truth and the wiki as a generated mirror — never hand-edit
# the wiki.
#
# Each docs/<name>.md becomes a wiki page titled from the filename
# (adding-class-loot.md -> "Adding Class Loot"); docs/Home.md becomes the landing page.
# Intra-doc relative links like (client-patch.md) are rewritten to the matching wiki
# page, and a grouped _Sidebar.md nav is generated (the curated order lives in the build
# step below; any doc not listed there is appended under "Other").
on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '.github/workflows/publish-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write   # GITHUB_TOKEN needs write to push to the repo's wiki

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wiki pages from docs/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          slugify() {
            echo "$1" | sed -E 's/[^A-Za-z0-9]+/-/g' \
              | awk -F- 'BEGIN{OFS="-"} { for (i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2) }1'
          }

          declare -A MAP
          for f in docs/*.md; do
            base="$(basename "$f" .md)"
            MAP["$base"]="$(slugify "$base")"
          done

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

          for f in docs/*.md; do
            base="$(basename "$f" .md)"
            slug="${MAP[$base]}"
            out="wiki/${slug}.md"
            cp "$f" "$out"
            for src in "${!MAP[@]}"; do
              dst="${MAP[$src]}"
              sed -i -E "s@\]\(${src}\.md(#[^)]*)?\)@](${dst}\1)@g" "$out"
            done
          done

          sidebar="wiki/_Sidebar.md"
          declare -A SEEN
          {
            printf '### mod-sod-world\n\n'
            printf -- '- [[Home]]\n\n'
          } > "$sidebar"
          SEEN["Home"]=1

          emit_section() {
            local heading="$1"; shift
            local printed=0 base slug title
            for base in "$@"; do
              [ -f "docs/${base}.md" ] || continue
              if [ "$printed" -eq 0 ]; then
                printf -- '**%s**\n\n' "$heading" >> "$sidebar"; printed=1
              fi
              slug="${MAP[$base]}"; title="$(echo "$slug" | tr '-' ' ')"
              printf -- '- [[%s|%s]]\n' "$title" "$slug" >> "$sidebar"
              SEEN["$base"]=1
            done
            [ "$printed" -eq 1 ] && printf '\n' >> "$sidebar"
          }

          emit_section "For module authors" adding-class-loot client-patch

          others=()
          for f in docs/*.md; do
            base="$(basename "$f" .md)"
            [ -n "${SEEN[$base]:-}" ] || others+=("$base")
          done
          if [ "${#others[@]}" -gt 0 ]; then
            printf -- '**Other**\n\n' >> "$sidebar"
            for base in "${others[@]}"; do
              slug="${MAP[$base]}"; title="$(echo "$slug" | tr '-' ' ')"
              printf -- '- [[%s|%s]]\n' "$title" "$slug" >> "$sidebar"
            done
          fi

      - name: Commit + push to wiki
        run: |
          set -euo pipefail
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Sync wiki from docs/ (${GITHUB_SHA::7})"
            git push
          else
            echo "No wiki changes to publish."
          fi
